spring:
  application:
    name: account-api

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:account-api}
    username: ${DB_USER:account-api}
    password: ${DB_PASSWORD:account-api}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: none

resilience4j:
  retry:
    instances:
      transacaoRetry:
        max-attempts: 5
        wait-duration: 150ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        enable-randomized-wait: true # Habilita o Jitter (adiciona uma pequena variação aleatória no tempo de espera, fazendo com que as threads se descoordenem naturalmente)
        randomized-wait-factor: 0.5  # Pode variar 50% para mais ou para menos
        retry-exceptions:
          - org.springframework.dao.OptimisticLockingFailureException

springdoc:
  swagger-ui:
    path: /v1/swagger-ui.html
    url: /openapi.yaml